<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Funcionários</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <script src="../Frota/js/theme.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-calendar-days"></i> Gestão de Escalas</h1>
                <div class="controls">
                    <div class="control-group">
                        <label for="month-selector">Mês/Ano:</label>
                        <input type="month" id="month-selector">
                    </div>
                    <div class="control-group">
                        <label for="scale-filter">Filtro de Escala:</label>
                        <select id="scale-filter">
                            <option value="all">Todas</option>
                            <option value="6x1">6x1</option>
                            <option value="5x2">5x2</option>
                            <option value="12x36">12x36</option>
                        </select>
                    </div>
                    <div class="control-actions">
                        <button id="theme-toggle" class="btn btn-secondary" onclick="toggleTheme()" title="Alternar Tema"><i class="fa-solid fa-circle-half-stroke"></i></button>
                        <button id="btn-manage-emp" class="btn btn-secondary" title="Gerenciar Funcionários"><i class="fa-solid fa-users"></i> Funcionários</button>
                        <button id="btn-export-pdf" class="btn btn-secondary" title="Exportar PDF"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                        <button id="btn-export-excel" class="btn btn-secondary" title="Exportar Excel"><i class="fa-solid fa-file-excel"></i> Excel</button>
                        <button id="btn-clear-data" class="btn btn-danger" title="Limpar dados do mês atual"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div class="table-container" id="schedule-container">
                <table id="schedule-table">
                    <thead>
                        <tr id="table-header-days">
                            <th rowspan="2" class="sticky-col name-col">Nome do Funcionário</th>
                            <th rowspan="2" class="sticky-col scale-col">Escala</th>
                            <!-- Dias will be inserted here dynamically -->
                            <th rowspan="2" class="total-col">Total<br>Folgas (X)</th>
                        </tr>
                        <tr id="table-header-weekdays">
                            <!-- Weekdays will be inserted here dynamically -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Employee rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal de Funcionários -->
    <div id="emp-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Gerenciar Funcionários</h2>
                <span class="close-modal" id="close-emp-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div class="add-emp-form">
                    <input type="text" id="new-emp-name" placeholder="Nome do Funcionário">
                    <select id="new-emp-scale">
                        <option value="6x1">6x1</option>
                        <option value="5x2">5x2</option>
                        <option value="12x36">12x36</option>
                    </select>
                    <button id="btn-add-emp" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Adicionar</button>
                </div>
                <div class="emp-list-container">
                    <table class="emp-list-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Escala</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="emp-list-body">
                            <!-- Employee rows for management will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
